<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nada & Ahmed - Our Wedding Celebration</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&family=Montserrat:wght@300&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f1ea; /* Elegant off-white for large screens */
            color: #4a4a4a;
            font-family: 'Montserrat', sans-serif;
            text-align: center;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 
           1. Background Logic: 
           Shows "1777855183140.jpeg" only on screens smaller than 1200px.
        */
        @media (max-width: 1200px) {
            body {
                background-image: url('1777855183140.jpeg');
                background-size: cover;
                background-position: center;
                background-attachment: fixed;
            }
        }

        @keyframes fadeInPage {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        @keyframes borderGrow {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .main-container {
            animation: fadeInPage 2s ease-in-out;
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        /* 
           2. The Arched Frame Shape:
           Using clip-path to create the Moroccan/Arabesque arch silhouette
        */
        .container {
            animation: borderGrow 1.2s ease-out;
            background-color: rgba(252, 250, 247, 0.95);
            padding: 100px 40px;
            position: relative;
            max-width: 500px;
            width: 90%;
            /* This creates the ornate arch shape */
            clip-path: polygon(50% 0%, 80% 10%, 100% 35%, 100% 70%, 80% 90%, 50% 100%, 20% 90%, 0% 70%, 0% 35%, 20% 10%);
            /* Fallback for browsers that don't support complex clip-paths */
            border-radius: 50% 50% 10% 10% / 20% 20% 0% 0%; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border: 2px solid #d4af37;
        }

        /* Gold inner border simulation */
        .container::after {
            content: "";
            position: absolute;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 1px solid #d4af37;
            clip-path: inherit;
            pointer-events: none;
        }

        .names {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            color: #d4af37;
            margin: 10px 0;
            transition: transform 0.3s ease;
        }

        .header-text {
            font-family: 'Cinzel', serif;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 0.9rem;
            color: #6a6a6a;
        }

        .details {
            font-size: 0.95rem;
            line-height: 1.6;
            margin: 20px 0;
        }

        .date {
            font-weight: bold;
            font-size: 1.2rem;
            color: #333;
            border-top: 1px solid #d4af37;
            border-bottom: 1px solid #d4af37;
            display: inline-block;
            padding: 8px 20px;
            margin: 10px 0;
            letter-spacing: 2px;
        }

        .rsvp-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 40px;
            background-color: #d4af37;
            color: white;
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 1rem;
            border-radius: 2px;
            transition: all 0.4s ease;
        }

        .rsvp-btn:hover {
            background-color: #333;
            transform: translateY(-3px);
        }

        .decoration {
            font-size: 1.5rem;
            color: #d4af37;
        }

        @media (max-width: 600px) {
            .names { font-size: 2.8rem; }
            .container { padding: 80px 20px; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="container">
            <div class="header-text">The Wedding Of</div>
            
            <div class="names">Nada & Ahmed</div>
            
            <div class="decoration">✧</div>

            <div class="details">
                Together with their families,<br>
                they request the honor of your presence<br>
                at their wedding celebration.
            </div>

            <div class="date">
                OCTOBER 10, 2026
            </div>

            <div class="details">
                <strong>THE GRAND PALACE HALL</strong><br>
                Cairo, Egypt <br>
                Ceremony begins at 7:00 PM
            </div>

            <a href="YOUR_RSVP_FORM_LINK_HERE" class="rsvp-btn">Kindly RSVP</a>
        </div>
    </div>

</body>
</html>
