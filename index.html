<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nada & Ahmed - Our Wedding Celebration</title>
    <!-- Elegant Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&family=Montserrat:wght@300&display=swap" rel="stylesheet">
    <style>
        /* 
           Crucial: This looks for the exact file name you uploaded.
           Must be named "background.png" in your repository main folder.
        */
        body {
            margin: 0;
            padding: 0;
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* Parallax scrolling effect */
            background-repeat: no-repeat;
            color: #4a4a4a;
            font-family: 'Montserrat', sans-serif;
            text-align: center;
            min-height: 100vh;
        }

        /* Subtle Fade-In animation for the entire page load */
        @keyframes fadeInPage {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* Border zoom-in animation */
        @keyframes borderGrow {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .main-container {
            animation: fadeInPage 2.5s ease-in-out; /* Page animation */
            padding: 50px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
        }

        .container {
            animation: borderGrow 1.5s ease-out; /* Border animation */
            background-color: rgba(252, 250, 247, 0.9); /* Semi-transparent cream overlay for readability */
            padding: 80px 20px;
            border: 2px solid #d4af37; /* Gold border */
            margin: 20px;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .names {
            font-family: 'Great Vibes', cursive;
            font-size: 4.5rem;
            color: #d4af37;
            margin-bottom: 5px;
            transition: transform 0.3s ease; /* Hover effect animation */
        }
        
        .names:hover {
            transform: scale(1.05) rotate(-2deg); /* Dynamic hover */
        }

        .header-text {
            font-family: 'Cinzel', serif;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: #6a6a6a;
        }

        .details {
            font-size: 1rem;
            line-height: 1.8;
            margin: 30px 0;
        }

        .date {
            font-family: 'Montserrat', sans-serif;
            font-weight: bold;
            font-size: 1.4rem;
            color: #333;
            border-top: 1px solid #d4af37;
            border-bottom: 1px solid #d4af37;
            display: inline-block;
            padding: 10px 30px;
            margin: 15px 0;
            letter-spacing: 2px;
        }

        .venue {
            margin-top: 40px;
            font-weight: 300;
        }

        .rsvp-btn {
            display: inline-block;
            margin-top: 50px;
            padding: 18px 45px;
            background-color: #d4af37;
            color: white;
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 1.1rem;
            border-radius: 2px;
            letter-spacing: 2px;
            transition: all 0.4s ease; /* Smooth hover transition */
            position: relative;
            overflow: hidden;
        }

        /* Hover slide animation for the button */
        .rsvp-btn:hover {
            background-color: #333; /* Shifts color to match mosque architecture accents */
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transform: translateY(-3px);
        }

        .decoration {
            font-size: 2rem;
            color: #d4af37;
            margin: 15px 0;
        }
        
        /* Mobile adjustment for large names font */
        @media (max-width: 600px) {
            .names { font-size: 3.2rem; }
            .container { padding: 50px 15px; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="container">
            <div class="header-text">The Wedding Of</div>
            
            <div class="names">Nada & Ahmed</div>
            
            <div class="decoration">✧</div>

            <div class="details">
                Together with their families, they request the <br>
                honor of your presence at their wedding celebration.
            </div>

            <div class="date">
                OCTOBER 10, 2026
            </div>

            <div class="details venue">
                <strong>THE GRAND PALACE HALL</strong><br>
                Cairo, Egypt <br>
                Ceremony begins at 7:00 PM
            </div>

            <!-- Replace '#' with your Google Form or Tally.so link -->
            <a href="YOUR_RSVP_FORM_LINK_GOES_HERE" class="rsvp-btn">Kindly RSVP</a>
        </div>
    </div>

</body>
</html>
