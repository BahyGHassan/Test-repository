<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nada & Ahmed - Wedding</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&family=Montserrat:wght@300&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            /* Using your mosque image 1777855183140.jpeg */
            background: url('1777855183140.jpeg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Montserrat', sans-serif;
        }

        /* Removes background on very large screens to prevent pixelation */
        @media (min-width: 1600px) {
            body { background: #f4f1ea; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            animation: fadeInUp 1.5s ease-out;
            background-color: rgba(255, 255, 255, 0.92);
            padding: 60px 30px;
            width: 85%;
            max-width: 450px;
            text-align: center;
            position: relative;
            
            /* The Moroccan Arch Shape from image_d2f71e.png */
            border-radius: 50% 50% 50% 50% / 15% 15% 15% 15%;
            border: 2px solid #d4af37;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        /* Adding the double-border effect seen in your reference */
        .container::after {
            content: '';
            position: absolute;
            top: 10px; bottom: 10px; left: 10px; right: 10px;
            border: 1px solid #d4af37;
            border-radius: inherit;
            pointer-events: none;
        }

        .names {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            color: #d4af37;
            margin: 5px 0;
        }

        .header-text {
            font-family: 'Cinzel', serif;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: 0.8rem;
            color: #777;
        }

        .date-box {
            border-top: 1px solid #d4af37;
            border-bottom: 1px solid #d4af37;
            display: inline-block;
            padding: 10px 25px;
            margin: 20px 0;
            font-weight: bold;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .details {
            font-size: 0.9rem;
            line-height: 1.7;
            color: #4a4a4a;
        }

        .rsvp-btn {
            display: inline-block;
            margin-top: 35px;
            padding: 15px 40px;
            background-color: #d4af37;
            color: white;
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            border-radius: 3px;
            transition: all 0.3s ease;
            position: relative;
            z-index: 10; /* Ensures button is clickable */
        }

        .rsvp-btn:hover {
            background-color: #b8962e;
            transform: scale(1.05);
        }

        .divider {
            color: #d4af37;
            font-size: 1.5rem;
            margin: 10px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-text">The Wedding Of</div>
        <h1 class="names">Nada & Ahmed</h1>
        <div class="divider">✧</div>

        <div class="details">
            Together with their families,<br>
            they request the honor of your presence<br>
            at their wedding celebration.
        </div>

        <div class="date-box">
            OCTOBER 10, 2026
        </div>

        <div class="details">
            <strong>THE GRAND PALACE HALL</strong><br>
            Cairo, Egypt <br>
            Ceremony begins at 7:00 PM
        </div>

        <a href="YOUR_RSVP_LINK_HERE" class="rsvp-btn">KINDLY RSVP</a>
    </div>

</body>
</html>
