<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bahy & Basma's Wedding</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&family=Montserrat:wght@300&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f4f1ea url('background_3.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        /* Desktop Split Layout */
        @media (min-width: 1200px) {
            body { 
                background: #f4f1ea; 
            }

            .main-container {
                display: flex;
                width: 100%;
                height: 100vh;
                padding: 0;
            }

            /* Left Side: Mosque Image */
            .left-side {
                width: 50%;
                height: 100%;
                background: url('background_4.jpg') no-repeat center center;
                background-size: cover;
            }

            /* Right Side: Solid background for text */
            .right-side {
                width: 50%;
                display: flex;
                justify-content: center;
                align-items: center;
                background-color: #f4f1ea;
            }
            
            /* On desktop, we want the arch to be solid cream */
            .arch-bg {
                fill: rgba(252, 250, 247, 1) !important;
            }
        }

        /* Mobile Layout Styling */
        @media (max-width: 1199px) {
            .main-container {
                width: 100%;
                padding: 40px 15px;
                box-sizing: border-box;
                display: flex;
                justify-content: center;
            }
            /* On mobile, make the arch slightly transparent to see the mosque */
            .arch-bg-path {
                fill: rgba(252, 250, 247, 0.92) !important;
            }
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 420px;
            aspect-ratio: 1 / 1.6; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            animation: reveal 2s ease-out forwards;
        }

        @keyframes reveal {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .arch-svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            width: 80%;
            padding: 10px 0;
        }

        /* Typography sizing */
        .header-text {
            font-family: 'Cinzel', serif;
            letter-spacing: 0.2em;
            font-size: clamp(0.6rem, 2.2vw, 0.75rem);
            color: #888;
            text-transform: uppercase;
            margin-bottom: 0.5em;
        }

        .names {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2.4rem, 11vw, 3.8rem);
            color: #d4af37;
            margin: 0.1em 0;
            line-height: 1.1;
        }

        .symbol { color: #d4af37; font-size: 1.2rem; margin: 0.4em 0; }

        .details {
            font-size: clamp(0.7rem, 2.8vw, 0.85rem);
            line-height: 1.6;
            color: #444;
            margin: 0.6em 0;
        }

        .date-section {
            border-top: 1px solid #d4af37;
            border-bottom: 1px solid #d4af37;
            padding: 0.5em 0;
            margin: 1em auto;
            width: 80%;
            font-weight: bold;
            font-size: clamp(0.85rem, 3.5vw, 1.1rem);
            color: #222;
            letter-spacing: 0.1em;
        }

        .rsvp-btn {
            display: inline-block;
            margin-top: 1.2em;
            padding: 0.8em 2.2em;
            background-color: #c9a742; 
            color: white;
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: clamp(0.7rem, 2.5vw, 0.85rem);
            letter-spacing: 0.1em;
            transition: 0.3s;
        }

        .rsvp-btn:hover { background: #b08d2e; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- This div only shows on PC -->
        <div class="left-side"></div>

        <div class="right-side">
            <div class="container">
                <!-- SVG Frame with the double-line border effect -->
                <svg class="arch-svg" viewBox="0 0 100 150" preserveAspectRatio="none">
                    <!-- The Background Shape -->
                    <path class="arch-bg-path" d="M50 0 C58 12 75 15 88 25 C100 35 100 55 100 75 C100 100 100 125 88 135 C75 145 58 145 50 150 C42 145 25 145 12 135 C0 125 0 100 0 75 C0 55 0 35 12 25 C25 15 42 12 50 0 Z" fill="rgba(252, 250, 247, 0.98)"/>
                    <!-- The Gold Border Line -->
                    <path d="M50 4 C57 14 73 17 85 27 C96 36 96 55 96 75 C96 95 96 122 85 131 C73 140 57 140 50 146 C43 140 27 140 15 131 C4 122 4 95 4 75 C4 55 4 36 15 27 C27 17 43 14 50 4 Z" fill="none" stroke="#d4af37" stroke-width="0.8"/>
                </svg>
                
                <div class="content">
                    <div class="header-text">The Wedding Of</div>
                    <div class="names">Bahy & Basma</div>
                    <div class="symbol">✧</div>

                    <div class="details">
                        Together with their families,<br>
                        they request the honor of your presence<br>
                        at their wedding celebration.
                    </div>

                    <div class="date-section">
                        OCTOBER 10, 2026
                    </div>

                    <div class="details">
                        <strong>THE GRAND PALACE HALL</strong><br>
                        Cairo, Egypt <br>
                        Ceremony begins at 7:00 PM
                    </div>

                    <a href="YOUR_RSVP_LINK" class="rsvp-btn">KINDLY RSVP</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
