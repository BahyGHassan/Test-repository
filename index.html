<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nada & Ahmed's Wedding</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&family=Montserrat:wght@300&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            /* Using your verified background name */
            background: #f4f1ea url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Montserrat', sans-serif;
        }

        /* Responsive: Hide mosque background on screens larger than the image resolution (approx 1200px) */
        @media (min-width: 1200px) {
            body { background-image: none; background-color: #f4f1ea; }
        }

        .main-container {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 2s ease-in-out;
        }

        /* 
           The Scalloped Arch Frame from image_d2f71e.png 
           Created with a detailed clip-path for that exact architectural shape.
        */
        .container {
            background-color: rgba(252, 250, 247, 0.96);
            padding: 80px 30px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            position: relative;
            /* Precise architectural silhouette */
            clip-path: polygon(50% 0%, 61% 3%, 74% 5%, 83% 11%, 91% 19%, 96% 29%, 100% 41%, 100% 60%, 96% 74%, 88% 85%, 78% 93%, 63% 97%, 50% 100%, 37% 97%, 22% 93%, 12% 85%, 4% 74%, 0% 60%, 0% 41%, 4% 29%, 9% 19%, 17% 11%, 26% 5%, 39% 3%);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* Gold Ornate Border - Matches image_d2f71e.png double-line style */
        .border-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 3px double #d4af37;
            clip-path: inherit;
            pointer-events: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .names {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            color: #d4af37;
            margin: 10px 0;
        }

        .header-text {
            font-family: 'Cinzel', serif;
            letter-spacing: 4px;
            font-size: 0.8rem;
            color: #777;
            text-transform: uppercase;
        }

        .details {
            font-size: 0.95rem;
            line-height: 1.8;
            color: #4a4a4a;
            margin: 15px 0;
        }

        .date-section {
            border-top: 1px solid #d4af37;
            border-bottom: 1px solid #d4af37;
            padding: 12px 0;
            margin: 20px 30px;
            font-weight: bold;
            font-size: 1.2rem;
            color: #333;
            letter-spacing: 1px;
        }

        .rsvp-btn {
            display: inline-block;
            margin-top: 25px;
            padding: 16px 45px;
            background-color: #c9a742; /* Precise gold from your screenshot */
            color: white;
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 1rem;
            border-radius: 2px;
            transition: all 0.4s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .rsvp-btn:hover {
            background-color: #333;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
        }

        .symbol { color: #d4af37; font-size: 1.5rem; margin: 10px 0; }

        @media (max-width: 480px) {
            .names { font-size: 2.8rem; }
            .container { padding: 60px 20px; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="container">
            <div class="border-overlay"></div>
            
            <div class="header-text">The Wedding Of</div>
            <div class="names">Nada & Ahmed</div>
            <div class="symbol">✧</div>

            <div class="details">
                Together with their families,<br>
                they request the honor of your presence<br>
                at their wedding celebration.
            </div>

            <div class="date-section">
                OCTOBER 10, 2026
            </div>

            <div class="details">
                <strong>THE GRAND PALACE HALL</strong><br>
                Cairo, Egypt <br>
                Ceremony begins at 7:00 PM
            </div>

            <a href="YOUR_RSVP_LINK_HERE" class="rsvp-btn">KINDLY RSVP</a>
        </div>
    </div>

</body>
</html>
