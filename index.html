<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nada & Ahmed's Wedding</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&family=Montserrat:wght@300&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            /* Forcing the background image 1777855183140.jpeg */
            background: #f4f1ea url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Montserrat', sans-serif;
        }

        /* Hide background on desktop screens (wider than 1200px) as requested */
        @media (min-width: 1200px) {
            body { background-image: none; background-color: #f4f1ea; }
        }

        .container {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 60px 20px;
            width: 85%;
            max-width: 420px;
            text-align: center;
            border: 2px solid #d4af37;
            position: relative;
            
            /* The Pointed Arch Shape from image_d2f71e.png */
            border-radius: 150px 150px 50px 50px / 100px 100px 50px 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: slideUp 1.2s ease-out;
        }

        /* Inner gold line for that elegant double-frame look */
        .container::before {
            content: "";
            position: absolute;
            top: 8px; left: 8px; right: 8px; bottom: 8px;
            border: 1px solid #d4af37;
            border-radius: inherit;
            pointer-events: none;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .names {
            font-family: 'Great Vibes', cursive;
            font-size: 3.8rem;
            color: #d4af37;
            margin: 10px 0;
        }

        .header-text {
            font-family: 'Cinzel', serif;
            letter-spacing: 4px;
            font-size: 0.8rem;
            color: #777;
        }

        .details {
            font-size: 0.95rem;
            line-height: 1.8;
            color: #4a4a4a;
            margin: 20px 0;
        }

        .date-divider {
            border-top: 1px solid #d4af37;
            border-bottom: 1px solid #d4af37;
            padding: 10px 0;
            margin: 20px 40px;
            font-weight: bold;
            font-size: 1.2rem;
            color: #333;
        }

        .rsvp-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 40px;
            background-color: #c9a742; /* Matches the button in your photo */
            color: white;
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 0.9rem;
            border-radius: 4px;
            transition: 0.3s;
        }

        .rsvp-btn:hover {
            background-color: #333;
            transform: scale(1.05);
        }

        .star { color: #d4af37; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-text">The Wedding Of</div>
        <div class="names">Nada & Ahmed</div>
        <div class="star">✧</div>

        <div class="details">
            Together with their families,<br>
            they request the honor of your presence<br>
            at their wedding celebration.
        </div>

        <div class="date-divider">
            OCTOBER 10, 2026
        </div>

        <div class="details">
            <strong>THE GRAND PALACE HALL</strong><br>
            Cairo, Egypt <br>
            Ceremony begins at 7:00 PM
        </div>

        <a href="YOUR_RSVP_LINK_HERE" class="rsvp-btn">KINDLY RSVP</a>
    </div>

</body>
</html>
