<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nada & Ahmed - Our Wedding Celebration</title>
    <!-- Elegant Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&family=Montserrat:wght@300&display=swap" rel="stylesheet">
    <style>/* --- UPDATED RESPONSIVE CSS --- */

body {
    margin: 0;
    padding: 0;
    /* 
       This property makes the background perfect.
       "contain" ensures the entire mosque image is visible.
    */
    background-image: url('background.jpg'); /* Make sure this matches your filename */
    background-size: contain;  /* The Magic Fix: Fits the entire image within the screen */
    background-position: center bottom; /* Anchor to the bottom (floor) of the image */
    background-attachment: scroll; /* Switched to scroll for better mobile performance */
    background-repeat: no-repeat;
    
    /* Set a dark accent background if the image aspect ratio leaves empty space */
    background-color: #fcfaf7; /* Matches the cream container color */
    
    color: #4a4a4a;
    font-family: 'Montserrat', sans-serif;
    text-align: center;
    min-height: 100vh;
}

.main-container {
    animation: fadeInPage 2.5s ease-in-out;
    padding: 50px 0;
    display: flex;
    justify-content: center;
    align-items: center; /* Vercally centered box */
    min-height: 100vh; /* Ensures main container takes up full height */
}

.container {
    animation: borderGrow 1.5s ease-out;
    background-color: rgba(252, 250, 247, 0.95); /* Slightly less transparent for readability against the full background */
    padding: 60px 15px; /* Reduced padding slightly */
    border: 2px solid #d4af37; /* Gold border */
    margin: 20px;
    max-width: 500px; /* Standardizing max-width for better display */
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    border-radius: 4px; /* Optional slight rounded corner */
}

/* Updated names size for better responsive display */
.names {
    font-family: 'Great Vibes', cursive;
    font-size: 3.5rem; /* Slightly smaller base font */
    color: #d4af37;
    margin-bottom: 5px;
    transition: transform 0.3s ease;
}

/* --- MOBILE SPECIFIC FIXES --- */
@media (max-width: 600px) {
    /* Anchors background specifically for vertical phone screens */
    body {
        background-position: center center;
    }
    
    .names {
        font-size: 2.8rem; /* Scales names text for mobile */
    }
    
    .container {
        padding: 40px 10px;
        margin: 10px;
    }
    
    .date {
        font-size: 1.2rem;
        padding: 8px 20px;
    }
}
    </style>
</head>
<body>

    <div class="main-container">
        <div class="container">
            <div class="header-text">The Wedding Of</div>
            
            <div class="names">Nada & Ahmed</div>
            
            <div class="decoration">✧</div>

            <div class="details">
                Together with their families, they request the <br>
                honor of your presence at their wedding celebration.
            </div>

            <div class="date">
                OCTOBER 10, 2026
            </div>

            <div class="details venue">
                <strong>THE GRAND PALACE HALL</strong><br>
                Cairo, Egypt <br>
                Ceremony begins at 7:00 PM
            </div>

            <!-- Replace '#' with your Google Form or Tally.so link -->
            <a href="YOUR_RSVP_FORM_LINK_GOES_HERE" class="rsvp-btn">Kindly RSVP</a>
        </div>
    </div>

</body>
</html>
